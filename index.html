<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 25px;
            color: white;
        }

        header h1 {
            font-size: 1.4rem;
        }

        .chat-box {
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .input-row {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
        }

        #q {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #q::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }

        button:disabled {
            opacity: 0.5;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎓 University RAG Chatbot</h1>
        </header>
        <div class="chat-box" id="chat">
            <div class="msg bot">👋 Ask me anything about your documents!</div>
        </div>
        <div class="input-row">
            <input id="q" placeholder="Type your question..." onkeydown="if(event.key==='Enter')ask()">
            <button id="btn" onclick="ask()">Send</button>
        </div>
    </div>
    <script>
        // Generate or retrieve session ID
        let sessionId = localStorage.getItem('rag_session_id');
        if (!sessionId) {
            sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('rag_session_id', sessionId);
        }

        async function ask() {
            const input = document.getElementById('q');
            const query = input.value.trim();
            if (!query) return;

            input.value = '';
            addMsg(query, 'user');

            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = '';

            // Create bot message for streaming
            const chat = document.getElementById('chat');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg bot';
            msgDiv.textContent = '';
            chat.appendChild(msgDiv);

            try {
                const res = await fetch('http://localhost:8000/api/v1/query/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, session_id: sessionId })
                });

                if (!res.ok) throw new Error('Query failed');

                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;
                            msgDiv.textContent += data;
                            chat.scrollTop = chat.scrollHeight;
                        }
                    }
                }
            } catch (e) {
                msgDiv.textContent = '❌ ' + e.message;
            }

            btn.disabled = false;
            btn.classList.remove('loading');
            btn.textContent = 'Send';
        }

        function addMsg(text, type) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>

</html>
